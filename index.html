const DATA = JSON.parse(document.getElementById("datos").textContent);
const $ = s => document.querySelector(s);
const MESES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
function fechaFmt(iso){
  if(!iso) return "sin fecha";
  const d = iso.slice(0,10).split("-");
  if(d.length!==3) return iso;
  return `${+d[2]} ${MESES[+d[1]-1]||""} ${d[0]}`;
}
function esc(s){const e=document.createElement("div");e.textContent=s??"";return e.innerHTML;}

function pintarStats(){
  const r = DATA.resumen;
  $("#stats").innerHTML =
    `<span class="stat"><b>${r.notas}</b> notas</span>`+
    `<span class="stat"><b>${r.menciones}</b> menciones</span>`+
    `<span class="stat rev"><b>${r.revision}</b> por revisar</span>`+
    `<span class="stat"><b>${r.medios}</b> medios</span>`;
}
function llenarFiltros(){
  const selP = $("#persona");
  for(const e of DATA.entidades){
    if(!e.menciones) continue;
    const o=document.createElement("option");
    o.value=e.id; o.textContent=`${e.nombre} (${e.menciones})`; selP.appendChild(o);
  }
  const selM = $("#medio");
  for(const m of DATA.medios){
    const o=document.createElement("option"); o.value=m; o.textContent=m; selM.appendChild(o);
  }
}
function chipHTML(m){
  const alias = (m.alias_detectado && m.alias_detectado.toLowerCase()!==m.entidad_nombre.toLowerCase())
    ? `<span class="alias">· ${esc(m.alias_detectado)}</span>` : "";
  const badge = m.estado==="revision" ? `<span class="badge">por revisar</span>` : "";
  return `<span class="chip ${m.estado}"><span class="nom">${esc(m.entidad_nombre)}</span>${alias}${badge}</span>`;
}
function notaHTML(n){
  const rev = n.menciones.some(m=>m.estado==="revision");
  const fuente = n.fuente_capa==="google_news" ? "Google News" : "scraping";
  return `<article class="nota ${rev?'rev':''}">
    <div class="meta">
      <span class="medio">${esc(n.medio)}</span><span class="dot">·</span>
      <span>${fechaFmt(n.fecha_pub)}</span><span class="src">${fuente}</span>
    </div>
    <div class="titulo"><a href="${esc(n.url)}" target="_blank" rel="noopener">${esc(n.titulo)}</a></div>
    <div class="chips">${n.menciones.map(chipHTML).join("")}</div>
  </article>`;
}
function filtrar(){
  const persona=$("#persona").value, medio=$("#medio").value,
        desde=$("#desde").value, hasta=$("#hasta").value, soloRev=$("#solo_rev").checked;
  const out = DATA.notas.filter(n=>{
    if(medio && n.medio!==medio) return false;
    const f = (n.fecha_pub||"").slice(0,10);
    if(desde && (!f || f<desde)) return false;
    if(hasta && (!f || f>hasta)) return false;
    if(persona && !n.menciones.some(m=>m.entidad_id===persona)) return false;
    if(soloRev && !n.menciones.some(m=>m.estado==="revision")) return false;
    return true;
  });
  $("#empty").style.display = out.length? "none":"block";
  $("#lista").innerHTML = out.map(notaHTML).join("");
}
["persona","medio","desde","hasta","solo_rev"].forEach(id=>$("#"+id).addEventListener("change", filtrar));
$("#limpiar").addEventListener("click", ()=>{
  ["persona","medio","desde","hasta"].forEach(id=>$("#"+id).value="");
  $("#solo_rev").checked=false; filtrar();
});
$("#pie").innerHTML =
  `Generado el ${esc(DATA.generado_legible)} · Snapshot de solo lectura. Cada nota enlaza a su publicación original.`+
  `<br>Sin clasificación de tono (fuera de alcance v1).`;
pintarStats(); llenarFiltros(); filtrar();
</script>
</body>
</html>
